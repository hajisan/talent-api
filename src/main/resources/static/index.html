<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nima Salami — Talent API. Praktikansøgning til Tech Chapter 2026.">
  <title>Nima Salami — Talent API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #080808;
      --fg:           #ede9e0;
      --muted:        #857f79;
      --accent:       #c8ff00;
      --cyan:         #00e5ff;
      --red:          #ff2d55;
      --border:       #1c1c1c;
      --surface:      #0c0c0c;
      --surface-hover:#111111;
      --text-xs:      0.7rem;
      --text-sm:      0.8rem;
      --text-base:    0.9rem;
      --text-lg:      1.1rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: var(--text-base);
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='turbulence' baseFrequency='0.65' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.15;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Header ── */
    header {
      position: fixed;
      inset: 0 0 auto;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      background: rgba(8, 8, 8, 0.75);
    }

    nav {
      padding: 1.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 700;
      font-size: var(--text-lg);
      color: var(--fg);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .logo:hover { opacity: 0.6; }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-link {
      font-size: var(--text-xs);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--fg); }

    /* ── Main ── */
    main {
      max-width: 48rem;
      margin-left: auto;
      margin-right: auto;
      padding: 6rem 1.5rem 4rem;
    }

    /* ── Sections ── */
    .section {
      margin-bottom: 3rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }
    .section:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .section-label {
      display: block;
      font-size: var(--text-xs);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* ── Hero ── */
    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(2.8rem, 9vw, 5rem);
      line-height: 1.0;
      color: var(--fg);
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .hero-title {
      font-size: var(--text-xs);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .hero-bio {
      font-size: var(--text-base);
      line-height: 1.8;
      color: var(--fg);
      max-width: 38rem;
      margin-bottom: 2rem;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 2rem;
      margin-bottom: 1.75rem;
    }

    .hero-meta-item {
      font-size: var(--text-xs);
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .hero-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .hero-link {
      font-size: var(--text-sm);
      color: var(--cyan);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: opacity 0.2s;
    }
    .hero-link:hover { opacity: 0.7; }

    /* ── Document list ── */
    .doc-list { display: flex; flex-direction: column; }

    .doc-item {
      display: flex;
      gap: 1.5rem;
      align-items: baseline;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .doc-item:first-child { border-top: 1px solid var(--border); }
    .doc-item:hover .doc-name { color: var(--cyan); }
    .doc-item:hover .doc-num  { color: var(--fg); }

    .doc-num {
      font-size: var(--text-xs);
      color: var(--muted);
      letter-spacing: 0.1em;
      min-width: 2rem;
      flex-shrink: 0;
      transition: color 0.15s;
      padding-top: 0.15rem;
    }

    .doc-body { flex: 1; min-width: 0; }

    .doc-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 600;
      font-size: 1.3rem;
      color: var(--fg);
      line-height: 1.2;
      margin-bottom: 0.4rem;
      transition: color 0.15s;
    }

    .doc-excerpt {
      font-size: var(--text-sm);
      color: var(--muted);
      line-height: 1.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-endpoint {
      display: inline-block;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-top: 0.5rem;
      text-decoration: none;
      transition: color 0.15s;
    }
    .doc-endpoint:hover { color: var(--cyan); }

    .doc-arrow {
      font-size: var(--text-sm);
      color: var(--muted);
      flex-shrink: 0;
      align-self: center;
      transition: color 0.15s, transform 0.15s;
    }
    .doc-item:hover .doc-arrow {
      color: var(--cyan);
      transform: translateX(3px);
    }

    /* ── Loading ── */
    .loading {
      color: var(--muted);
      font-size: var(--text-sm);
      letter-spacing: 0.08em;
      padding: 2rem 0;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 8, 0.92);
      z-index: 200;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 5rem 1.5rem 3rem;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      max-width: 48rem;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 1.9rem;
      color: var(--fg);
      line-height: 1.1;
    }

    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: var(--text-xs);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .modal-close:hover { border-color: var(--fg); color: var(--fg); }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal-section-label {
      font-size: var(--text-xs);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 0.5rem;
    }

    .modal-para {
      font-size: var(--text-base);
      line-height: 1.8;
      color: var(--fg);
    }

    /* ── Partner ── */
    .partner-card {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.25rem;
      border: 1px solid var(--border);
      background: var(--surface);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
      margin-top: 1.5rem;
    }
    .partner-card:hover {
      border-color: var(--cyan);
      background: var(--surface-hover);
    }

    .partner-avatar {
      width: 2.75rem;
      height: 2.75rem;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      letter-spacing: 0.1em;
      color: var(--muted);
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .partner-card:hover .partner-avatar {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .partner-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--fg);
      margin-bottom: 0.2rem;
    }

    .partner-desc {
      font-size: var(--text-xs);
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.75rem 1.5rem;
      max-width: 48rem;
      margin: 0 auto;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .footer-note {
      font-size: var(--text-xs);
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .footer-link {
      font-size: var(--text-xs);
      color: var(--muted);
      letter-spacing: 0.06em;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-link:hover { color: var(--fg); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      nav { padding: 1.25rem; }
      .hero-name { font-size: clamp(2.5rem, 13vw, 3.5rem); }
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 0.4rem; }
      .modal { padding: 1.5rem; }
      .modal-overlay { padding: 4rem 1rem 2rem; }
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="/" class="logo">N</a>
    <div class="nav-links">
      <a href="https://www.nimasalami.dk" target="_blank" rel="noopener" class="nav-link">nimasalami.dk ↗</a>
      <a href="/swagger-ui.html" target="_blank" rel="noopener" class="nav-link">Swagger ↗</a>
    </div>
  </nav>
</header>

<main>
  <section class="section" id="hero-section">
    <span class="section-label">01 / Profil</span>
    <div class="loading" id="hero-loading">henter profil...</div>
  </section>

  <section class="section" id="docs-section">
    <span class="section-label">02 / Dokumenter</span>
    <div id="doc-list" class="doc-list">
      <div class="loading" id="docs-loading">henter dokumenter...</div>
    </div>
  </section>

  <section class="section" id="partner-section">
    <span class="section-label">03 / Søger sammen med</span>
    <p style="font-size:var(--text-base);line-height:1.75;color:var(--fg)">Vi er to studiekammerater der søger praktik hos Tech Chapter sammen.</p>
    <a href="https://andreasgabel.dk" class="partner-card" target="_blank" rel="noopener">
      <div class="partner-avatar">AG</div>
      <div>
        <div class="partner-name">Andreas Gabel</div>
        <div class="partner-desc">Datamatiker-studerende — se hans portfolio ↗</div>
      </div>
    </a>
  </section>
</main>

<footer>
  <div class="footer-inner">
    <span class="footer-note">Tech Chapter — Praktikansøgning 2026</span>
    <a href="/swagger-ui.html" target="_blank" rel="noopener" class="footer-link">API docs ↗</a>
  </div>
</footer>

<div class="modal-overlay" id="modal-overlay" aria-modal="true" role="dialog">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title"></h2>
      <button class="modal-close" id="modal-close">Luk ×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Section headers in document content — rendered in accent color
  const SECTION_RE = /\b(LINK|TYPE|REPO|BESKRIVELSE|STACK|HVAD JEG LÆRTE|UDDANNELSE|TECH STACK[^:]*|ERHVERVSERFARING|JUNIORKONSULENT[^.]*|ADM\.[^.]*|PRODUKTIONSMANAGER[^.]*)\s*:/g;

  function formatContent(text) {
    // Break into chunks at known section headings
    const chunks = text
      .replace(/\.\s+(LINK|TYPE|REPO|BESKRIVELSE|STACK|HVAD JEG LÆRTE|UDDANNELSE|TECH STACK|ERHVERVSERFARING):/g, '.\n\n$1:')
      .split('\n\n')
      .map(s => s.trim())
      .filter(Boolean);

    return chunks.map(chunk => {
      const isHeader = /^[A-ZÆØÅ][A-ZÆØÅ\s–&-]+:/.test(chunk);
      if (isHeader) {
        const colon = chunk.indexOf(':');
        const label = chunk.slice(0, colon + 1);
        const rest  = chunk.slice(colon + 1).trim();
        return `<div class="modal-section-label">${esc(label)}</div>`
          + (rest ? `<p class="modal-para">${esc(rest)}</p>` : '');
      }
      return `<p class="modal-para">${esc(chunk)}</p>`;
    }).join('\n');
  }

  let currentTalentId = null;

  async function init() {
    try {
      const talents = await fetch('/talent').then(r => r.json());
      const talent  = talents[0];
      currentTalentId = talent.id;
      renderHero(talent);

      const docs = await fetch(`/talent/${talent.id}/documents`).then(r => r.json());
      renderDocs(docs, talent.id);
    } catch {
      document.getElementById('hero-loading').textContent = 'API ikke tilgængeligt.';
      document.getElementById('docs-loading').textContent = '';
    }
  }

  function renderHero(t) {
    document.getElementById('hero-loading').remove();
    const section = document.getElementById('hero-section');

    const metaItems = [
      t.city && t.country ? `${esc(t.city)}, ${esc(t.country)}` : null,
      t.phone ? esc(t.phone) : null,
      t.email ? `<a class="hero-link" href="mailto:${esc(t.email)}">${esc(t.email)}</a>` : null,
    ].filter(Boolean);

    const links = [
      t.github   ? `<a class="hero-link" href="${esc(t.github)}"   target="_blank" rel="noopener">GitHub ↗</a>` : '',
      t.linkedin ? `<a class="hero-link" href="${esc(t.linkedin)}" target="_blank" rel="noopener">LinkedIn ↗</a>` : '',
    ].filter(Boolean);

    section.insertAdjacentHTML('beforeend', `
      <h1 class="hero-name">${esc(t.name)}</h1>
      <p class="hero-title">${esc(t.title)}</p>
      ${t.profileText ? `<p class="hero-bio">${esc(t.profileText)}</p>` : ''}
      ${metaItems.length ? `<div class="hero-meta">${metaItems.map(i => `<span class="hero-meta-item">${i}</span>`).join('')}</div>` : ''}
      ${links.length    ? `<div class="hero-links">${links.join('')}</div>` : ''}
    `);
  }

  function renderDocs(docs, talentId) {
    const list = document.getElementById('doc-list');
    list.innerHTML = '';

    if (!docs.length) {
      list.innerHTML = '<p class="loading" style="animation:none">Ingen dokumenter fundet.</p>';
      return;
    }

    const shortId  = id => id.slice(0, 8) + '…';
    const endpointPath  = (tId, dId) => `/talent/${tId}/documents/${dId}`;
    const endpointLabel = (tId, dId) =>
      `GET /talent/${shortId(tId)}/documents/${shortId(dId)}`;

    docs.forEach((doc, i) => {
      const excerpt = doc.content
        ? doc.content.replace(/\s+/g, ' ').slice(0, 110) + (doc.content.length > 110 ? '…' : '')
        : '';

      const el = document.createElement('div');
      el.className = 'doc-item';
      el.dataset.talentId = talentId;
      el.dataset.docId    = doc.id;
      el.innerHTML = `
        <span class="doc-num">${String(i + 1).padStart(2, '0')}</span>
        <div class="doc-body">
          <div class="doc-name">${esc(doc.name)}</div>
          ${excerpt ? `<div class="doc-excerpt">${esc(excerpt)}</div>` : ''}
          <a class="doc-endpoint" href="${esc(endpointPath(talentId, doc.id))}" target="_blank" rel="noopener">${esc(endpointLabel(talentId, doc.id))} ↗</a>
        </div>
        <span class="doc-arrow">→</span>
      `;
      el.addEventListener('click', () => openDoc(talentId, doc.id));
      el.querySelector('.doc-endpoint').addEventListener('click', e => e.stopPropagation());
      list.appendChild(el);
    });
  }

  async function openDoc(talentId, docId) {
    try {
      const doc = await fetch(`/talent/${talentId}/documents/${docId}`).then(r => r.json());
      document.getElementById('modal-title').textContent = doc.name;
      document.getElementById('modal-body').innerHTML = formatContent(doc.content || '');
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    } catch {
      /* silently ignore */
    }
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  init();
</script>
</body>
</html>
